<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta data-template-name="Size_160x600" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="ad.size" content="width=160,height=600" />
    <title>Us Cellular</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <div class="ad">
      <!-- Assets -->
      <div class="asset asset__image-frame-1"></div>
      <div class="asset asset__bg-shape"></div>
      <div class="asset asset__device-image"></div>
      <div class="asset asset__bg-pattern"></div>
      
      <!-- Headline -->
      <div class="main-headline main-headline-frame-1">
        <div class="headline headline-1">
          <h1 class="headline__text headline__text-1"></h1>
          <h2 class="subheadline subheadline__f1"></h2>
        </div>
        <div class="headline headline-2">
          <h1 class="headline__text headline__text-2"></h1>
          <h2 class="subheadline subheadline__f2"></h2>
        </div>
        <div class="headline headline-3">
          <h1 class="headline__text headline__text-3"></h1>
          <h2 class="subheadline subheadline__f3"></h2>
        </div>
      </div>

      <!-- Logo -->
      <div class="logo"></div>

      <!-- CTA -->
      <div class="cta__container">
        <h2 class="cta__text"></h2>
      </div>

      <!-- Exit -->
      <div class="exit"></div>

      <!-- Legal -->
      <button class="disclaimer__button">DISCLAIMER</button>
      <div class="disclaimer__container">
        <h6 class="disclaimer__title">Disclaimer</h6>
        <div class="disclaimer__text"></div>
        <div class="disclaimer__close-button"></div>
      </div>
    </div>

    <script src="https://cdn.flashtalking.com/frameworks/js/gsap/latest/gsap.min.js"></script>
    <script src="https://cdn.flashtalking.com/frameworks/js/api/2/10/html5API.js"></script>
    <script src="main.js"></script>
  </body>
</html>
