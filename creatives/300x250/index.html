<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta data-template-name="Size_300x250" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="ad.size" content="width=300,height=250" />
    <title>Us Cellular</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <main class="ad">
      <!-- Logo -->
      <img class="logo"/ alt="US Cellular Logo">
      
      <!-- Assets -->
      <img src="" alt="Brand Shape" class="asset asset__bg-pattern"/>
      <img src="" alt="Brand Shape Offer Pattern" class="asset asset__bg-offer-pattern"/>
      <img src="" alt="" class="asset asset__image-frame-1">
      <img src="" alt="" class="asset asset__image-frame-2">
      
      <!-- Headline -->
      <div class="main-headline main-headline-frame-1">
        <section>
          <div class="headline headline-1" tabindex="0">
            <h1 class="headline__text headline__text-1"></h1>
            <h2 class="subheadline subheadline__f1"></h2>
          </div>
        </section>
        <section>
          <div class="headline headline-2" tabindex="0">
            <h1 class="headline__text headline__text-2"></h1>
            <h2 class="subheadline subheadline__f2"></h2>
          </div>
        </section>
        <section>
          <div class="headline headline-3" tabindex="0">
            <h1 class="headline__text headline__text-3"></h1>
            <h2 class="subheadline subheadline__f3"></h2>
          </div>
        </section>
      </div>
      <img src="" alt="" class="asset asset__image-frame-3">

      <!-- CTA -->
      <button class="cta__container">
        <h2 class="cta__text"></h2>
      </button>

      <!-- Exit -->
      <!-- <button class="exit">
        <span class="sr-only">Ad URL Clickthrough</span>
      </button> -->

      <!-- Legal -->
      <button class="disclaimer__button">DISCLAIMER</button>
      <section class="disclaimer__container"> 
        <h6 class="disclaimer__title">Disclaimer</h6>
        <p class="disclaimer__text"></p>
        <button class="disclaimer__close-button">
          <span class="sr-only">Close disclaimer</span>
        </button>
      </section>
    </div>

    <script src="https://cdn.flashtalking.com/frameworks/js/gsap/latest/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.6.1/gsap.min.js"></script>
    <script src="https://cdn.flashtalking.com/frameworks/js/api/2/10/html5API.js"></script>
    <script src="main.js"></script>
  </body>
</html>
